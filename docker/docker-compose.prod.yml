# Прод-стек: наружу торчит ТОЛЬКО nginx (80/443). Postgres/Redis/MinIO — без host-портов,
# общие для blue/green. Деплой — docker/deploy.sh (zero-downtime blue→green).
#
# Первый запуск (из корня репо):
#   docker/nginx/make-self-signed.sh                 # или боевые серты (certbot)
#   docker compose -f docker/docker-compose.prod.yml --env-file .env run --rm migrate
#   docker compose -f docker/docker-compose.prod.yml --env-file .env up -d
# Деплой новой версии: docker/deploy.sh
version: "3.9"

x-backend: &backend
  build:
    context: ../backend
  image: platform-backend:latest
  env_file: ../.env
  environment:
    UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
  depends_on:
    - postgres
    - redis
    - minio
  restart: unless-stopped

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # One-shot: применить миграции (expand/contract) ДО переключения трафика.
  # profiles → не стартует на `up`, только явным `run --rm migrate` (первый запуск/deploy.sh).
  migrate:
    <<: *backend
    profiles: ["migrate"]
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  backend-blue:
    <<: *backend

  backend-green:
    <<: *backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:1.27
    depends_on:
      - backend-blue
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      MEDIA_DOMAIN: ${MEDIA_DOMAIN}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/active_backend.conf:/etc/nginx/active_backend.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_webroot:
