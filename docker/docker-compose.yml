# Dev-окружение: stateful-сервисы в контейнерах.
# Backend и frontend на этом этапе запускаются на хосте (uvicorn / vite dev).
# Порты наружу открыты ТОЛЬКО для локальной разработки. В прод-конфиге их убрать —
# сервисы должны быть доступны лишь внутри docker-сети (наружу торчит только nginx).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"          # dev only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"          # dev only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"          # S3 API (dev)
      - "9001:9001"          # web-консоль (dev)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Воркер серверного транскода видео (docs/FILES.md «Транскод видео»). Отдельный
  # процесс: тянет джобы из Redis, гонит ffmpeg (H.264 720p + faststart), заливает
  # вариант/постер в MinIO и обновляет media_assets. Образ — тот же backend-Dockerfile
  # (в нём уже есть ffmpeg). Наружу портов не открывает. Прод-аналог — см. docs/DEPLOY.md
  # (пользователь добавляет сервис в прод-compose вручную).
  #
  # Примечание: dev-бэкенд (uvicorn) при этом запускается на ХОСТЕ (см. шапку файла), а
  # воркеру нужен доступ к postgres/redis/minio по docker-сети — поэтому он в compose.
  transcode-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker.transcode"]
    env_file: ../.env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
