# Активный цвет blue-green. ЕДИНСТВЕННЫЙ файл, который правит docker/deploy.sh
# (затем `nginx -s reload`). Не балансируем по обоим — трафик идёт строго на активный.
upstream backend {
    server backend-blue:8000;
    # Пул keepalive-соединений nginx→backend: не открываем новый TCP+TLS на
    # каждый /api/-запрос. deploy.sh правит ТОЛЬКО строку server (sed по
    # backend-<цвет>:8000), эта строка переживает переключение blue/green.
    keepalive 32;
}
