<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500&family=Prata&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0B100E; padding: 20px 24px; }
  .label { font-family: 'Onest', sans-serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #4F4B42; margin-bottom: 10px; }
  .divider { border: none; border-top: 1px solid #1C211E; margin: 14px 0; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="label">Метки секций</div>
  <div class="row">
    <span style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#5F5B50;">01 · ПОРОГ</span>
    <span style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#5F5B50;">02 · ЧТО ЭТО</span>
    <span style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#5F5B50;">03 · МАНИФЕСТ</span>
  </div>
  <hr class="divider">
  <div class="label">Движения — бейджи</div>
  <div class="row">
    <span style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#8E897B; padding:5px 10px; border:1px solid #2E332F; border-radius:4px;">ЯВЬ</span>
    <span style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#A2554E; padding:5px 10px; border:1px solid #3A2020; border-radius:4px;">НАВЬ</span>
    <span style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#A38E58; padding:5px 10px; border:1px solid #3A2E18; border-radius:4px;">ПРАВЬ</span>
  </div>
  <hr class="divider">
  <div class="label">Движения — текстовые + подписи</div>
  <div class="row" style="gap:24px;">
    <div>
      <div style="font-family:'Prata',serif; font-size:20px; color:#E9E2D4;">Внутрь</div>
      <div style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#8E897B; margin-top:3px;">ЯВЬ</div>
    </div>
    <div>
      <div style="font-family:'Prata',serif; font-size:20px; color:#E9E2D4;">Вглубь</div>
      <div style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#A2554E; margin-top:3px;">НАВЬ</div>
    </div>
    <div>
      <div style="font-family:'Prata',serif; font-size:20px; color:#E9E2D4;">Наверх</div>
      <div style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#A38E58; margin-top:3px;">ПРАВЬ</div>
    </div>
  </div>
</body>
</html>
