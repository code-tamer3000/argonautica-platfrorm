<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400&family=Prata&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0B100E; padding: 20px 24px; font-family: 'Onest', sans-serif; }
  .label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #4F4B42; margin-bottom: 10px; }
  .divider { border: none; border-top: 1px solid #1C211E; margin: 16px 0; }
  .glyph-row { display: flex; gap: 28px; align-items: flex-start; }
  .glyph { text-align: center; }
  .glyph-name { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; }
  .glyph-sub { font-size: 8px; letter-spacing: 1px; color: #5F5B50; margin-top: 2px; }
</style>
</head>
<body>
  <div class="label">Звезда-искра — главный знак</div>
  <div style="display:flex; gap:20px; align-items:center; margin-bottom:14px;">
    <svg width="32" height="32" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#C29A48"/></svg>
    <svg width="24" height="24" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#C29A48"/></svg>
    <svg width="16" height="16" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#C29A48"/></svg>
    <svg width="10" height="10" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#C29A48"/></svg>
    <svg width="32" height="32" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#E9E2D4"/></svg>
    <svg width="32" height="32" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#8E2018"/></svg>
  </div>
  <div style="font-size:9px; color:#4F4B42; letter-spacing:1px;">Золото · Кость · Кровь — Буллет / Разделитель / Фавикон / CTA</div>

  <hr class="divider">
  <div class="label">Три движения — глифы</div>
  <div class="glyph-row">
    <!-- Явь: crosshair in circle -->
    <div class="glyph">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="18" fill="none" stroke="#E9E2D4" stroke-width="1.5"/>
        <line x1="22" y1="7" x2="22" y2="37" stroke="#E9E2D4" stroke-width="1.5"/>
        <line x1="7" y1="22" x2="37" y2="22" stroke="#E9E2D4" stroke-width="1.5"/>
        <circle cx="22" cy="22" r="3" fill="#E9E2D4"/>
      </svg>
      <div class="glyph-name" style="color:#C7C0B1;">ЯВЬ</div>
      <div class="glyph-sub">Внутрь · в точку</div>
    </div>
    <!-- Навь: dark sphere with inner spark -->
    <div class="glyph">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="18" fill="#1A0A08" stroke="#8E2018" stroke-width="1.5"/>
        <circle cx="22" cy="22" r="10" fill="none" stroke="#8E2018" stroke-width="0.8" stroke-dasharray="2 2"/>
        <circle cx="22" cy="15" r="2" fill="#8E2018" opacity="0.7"/>
        <circle cx="29" cy="26" r="2" fill="#8E2018" opacity="0.7"/>
        <circle cx="15" cy="27" r="2" fill="#8E2018" opacity="0.7"/>
        <path d="M22,18 C23,-3 23,17 22,26 C21,17 21,-3 22,18Z" fill="#B23A2E" opacity="0.5" transform="rotate(0,22,22)" style="display:none"/>
        <svg x="17" y="17" width="10" height="10" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#B23A2E"/></svg>
      </svg>
      <div class="glyph-name" style="color:#B23A2E;">НАВЬ</div>
      <div class="glyph-sub">Вглубь · внутри точки</div>
    </div>
    <!-- Правь: radiant burst from star -->
    <div class="glyph">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <line x1="22" y1="4" x2="22" y2="14" stroke="#C29A48" stroke-width="1.5"/>
        <line x1="22" y1="30" x2="22" y2="40" stroke="#C29A48" stroke-width="1.5"/>
        <line x1="4" y1="22" x2="14" y2="22" stroke="#C29A48" stroke-width="1.5"/>
        <line x1="30" y1="22" x2="40" y2="22" stroke="#C29A48" stroke-width="1.5"/>
        <line x1="9" y1="9" x2="16" y2="16" stroke="#C29A48" stroke-width="1" opacity="0.6"/>
        <line x1="28" y1="28" x2="35" y2="35" stroke="#C29A48" stroke-width="1" opacity="0.6"/>
        <line x1="35" y1="9" x2="28" y2="16" stroke="#C29A48" stroke-width="1" opacity="0.6"/>
        <line x1="9" y1="35" x2="16" y2="28" stroke="#C29A48" stroke-width="1" opacity="0.6"/>
        <svg x="16" y="16" width="12" height="12" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#C29A48"/></svg>
      </svg>
      <div class="glyph-name" style="color:#C29A48;">ПРАВЬ</div>
      <div class="glyph-sub">Наверх · из точки</div>
    </div>
  </div>
</body>
</html>
