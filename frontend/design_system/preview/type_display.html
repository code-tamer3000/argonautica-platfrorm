<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Onest:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0B100E; padding: 24px 28px; }

<body>
  <div class="label">T2 · PRATA · DISPLAY</div>

  <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
    <svg width="10" height="10" viewBox="-11 -11 22 22" class="star"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#C29A48"/></svg>

    <span style="font-family:'Prata',serif; font-size:19px; color:#C29A48;">XV · Оживление</span>
  </div>
  <hr class="divider">
  <div class="label" style="margin-bottom:6px;">T1 · ЦЕРЕМОНИАЛ — Prata как заглушка</div>
  <div style="font-family:'Prata',serif; font-size:28px; letter-spacing:6px; color:#E9E2D4; text-transform:uppercase;">АРГОНАВТИКА</div>
  <div style="font-family:'Onest',sans-serif; font-size:9px; letter-spacing:1.5px; color:#4F4B42; margin-top:6px;">↑ Заменить на кастомную кириллическую вязь</div>
