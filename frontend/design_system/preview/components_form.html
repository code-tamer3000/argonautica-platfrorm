<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500&family=Prata&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0B100E; padding: 20px 24px; }
  .label { font-family: 'Onest', sans-serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #4F4B42; margin-bottom: 10px; }
  .field { font-family: 'Onest', sans-serif; font-size: 13px; color: #4F4B42; border: 1px solid #2E332F; padding: 11px 16px; border-radius: 6px; background: transparent; width: 100%; display: block; }
  .btn { font-family: 'Onest', sans-serif; font-size: 13px; letter-spacing: 1px; color: #0B100E; padding: 11px 20px; border-radius: 6px; background: #C29A48; display: inline-block; }
  .divider { border: none; border-top: 1px solid #1C211E; margin: 16px 0; }
  .form-row { display: flex; gap: 10px; align-items: center; }
</style>
</head>
<body>
  <div class="label">05 · Форма заявки — Экспедиция</div>
  <div style="background:#0C100F; border:1px solid #2C322E; border-radius:8px; padding:20px;">
    <div style="font-family:'Prata',serif; font-size:18px; color:#E9E2D4; margin-bottom:6px;">Экспедиция посылания на хер.</div>
    <div style="font-family:'Onest',sans-serif; font-style:italic; font-size:12px; color:#9A9486; margin-bottom:14px;">После Манифеста — заявка на участие. Программа собирается. Зовём Первых.</div>
    <div class="form-row">
      <span class="field">e-mail / telegram</span>
      <span class="btn">Оставить заявку</span>
    </div>
  </div>
  <hr class="divider">
  <div class="label">Поле с фокусом</div>
  <div style="font-family:'Onest',sans-serif; font-size:13px; color:#C7C0B1; border:1px solid rgba(194,154,72,0.5); padding:11px 16px; border-radius:6px; background:transparent; margin-bottom:8px;">@argonaut_user</div>
  <div style="font-family:'Onest',sans-serif; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#4F4B42;">Focus → gold border</div>
</body>
</html>
