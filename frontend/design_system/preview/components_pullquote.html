<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Lora:ital@1&family=Onest:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0B100E; padding: 20px 24px; }
  .divider { border: none; border-top: 1px solid rgba(194,154,72,0.2); margin: 16px 0; }
</style>
</head>
<body>
  <!-- Pull-quote: gold star + Prata -->
  <div style="display:flex; gap:12px; align-items:flex-start; padding: 0 0 4px;">
    <svg style="flex-shrink:0; margin-top:6px;" width="14" height="14" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#C29A48"/></svg>
    <div style="font-family:'Prata',serif; font-size:22px; line-height:1.3; color:#E9E2D4; max-width:44ch;">
      Орден тех, кто различает живое от неживого.
    </div>
  </div>
  <hr class="divider">
  <!-- Blood line — harsh -->
  <div style="display:flex; gap:12px; align-items:flex-start;">
    <svg style="flex-shrink:0; margin-top:5px;" width="10" height="10" viewBox="-11 -11 22 22"><path d="M0,-10 C1.5,-3 3,-1.5 10,0 C3,1.5 1.5,3 0,10 C-1.5,3 -3,1.5 -10,0 C-3,-1.5 -1.5,-3 0,-10 Z" fill="#8E2018"/></svg>
    <div style="font-family:'Prata',serif; font-size:17px; line-height:1.35; color:#B23A2E; max-width:44ch;">
      Тьма — строительный материал, не враг.
    </div>
  </div>
  <hr class="divider">
  <!-- Lora italic aside -->
  <div style="font-family:'Lora',serif; font-style:italic; font-size:16px; line-height:1.7; color:#9A9486; max-width:48ch; padding-left:18px; border-left:1px solid rgba(194,154,72,0.3);">
    Ты не идёшь к свету — ты из него исходишь.
  </div>
  <hr class="divider">
  <!-- Section note -->
  <div style="font-family:'Onest',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#5F5B50;">
    РЕЖИМ ЧТЕНИЯ · СЕРЬЁЗНАЯ КНИГА · ПАУЗЫ
  </div>
</body>
</html>
