<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0B100E; padding: 16px 20px; font-family: 'Onest', sans-serif; }
  .label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #4F4B42; margin-bottom: 8px; }
  .spectrum { display: flex; gap: 0; border-radius: 6px; overflow: hidden; height: 36px; margin-bottom: 6px; }
  .seg { flex: 1; }
  .labels-row { display: flex; gap: 0; }
  .seg-label { flex: 1; font-size: 8px; color: #4F4B42; text-align: center; padding-top: 3px; }
  .divider { border: none; border-top: 1px solid #1C211E; margin: 12px 0; }
</style>
</head>
<body>
  <div class="label">Спектр сознания — резерв для Карты миров</div>
  <div class="spectrum">
    <div class="seg" style="background:#000000;"></div>
    <div class="seg" style="background:#8E2018;"></div>
    <div class="seg" style="background:#C24A18;"></div>
    <div class="seg" style="background:#C29A48;"></div>
    <div class="seg" style="background:#134E45;"></div>
    <div class="seg" style="background:#1A3A6E;"></div>
    <div class="seg" style="background:#2E1A6E;"></div>
    <div class="seg" style="background:#4E1A6E;"></div>
    <div class="seg" style="background:#F4F1E9;"></div>
  </div>
  <div class="labels-row">
    <span class="seg-label">0</span>
    <span class="seg-label">1</span>
    <span class="seg-label">2</span>
    <span class="seg-label">3</span>
    <span class="seg-label">4</span>
    <span class="seg-label">5</span>
    <span class="seg-label">6</span>
    <span class="seg-label">7</span>
    <span class="seg-label">8</span>
  </div>
  <div style="font-size:9px; color:#3C413D; margin-top:6px; letter-spacing:0.5px;">Чёрный → Красный → Оранжевый → Золото → Бирюза → Синий → Индиго → Фиолет → Белый</div>
  <div class="divider"></div>
  <div style="font-size:9px; color:#4F4B42; letter-spacing:1px;">⚠ Только для системного контента (64 кода). В общем интерфейсе не использовать.</div>
</body>
</html>
