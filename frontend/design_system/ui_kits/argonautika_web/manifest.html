<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Argonautika Web" name="Страница — Манифест (/manifest)" subtitle="Полный текст Манифеста в режиме книги · своя шапка · CTA на заявку" viewport="1200x720" -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аргонавтика — Манифест</title>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #0B100E; -webkit-font-smoothing: antialiased; color: #E9E2D4; overflow-x: clip; }
  ::selection { background: rgba(194,154,72,0.25); color: #F4F1E9; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #060908; }
  ::-webkit-scrollbar-thumb { background: #2C322E; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #9C7A33; }
  a:focus-visible { outline: 2px solid rgba(194,154,72,0.5); outline-offset: 2px; }
  button:focus-visible { outline: 2px solid rgba(194,154,72,0.5); outline-offset: 2px; }

  /* ── Manifest layout: sticky TOC + chapters ── */
  .manifest-layout {
    display: grid;
    grid-template-columns: 244px 1fr;
    gap: clamp(28px,4vw,68px);
    max-width: 1160px;
    margin: 0 auto;
    padding: 0 clamp(22px,5vw,56px);
    align-items: start;
  }
  .toc-rail { position: sticky; top: 84px; }
  .toc-list::-webkit-scrollbar { width: 4px; }
  .toc-list::-webkit-scrollbar-thumb { background: #2C322E; border-radius: 2px; }
  .chapters-col { min-width: 0; }

  @media (max-width: 880px) {
    .manifest-layout { grid-template-columns: 1fr; gap: 0; }
    .toc-rail {
      position: sticky; top: 60px; z-index: 50;
      background: rgba(7,11,9,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      margin: 0 calc(-1 * clamp(22px,5vw,56px)) 24px;
      padding: 16px clamp(22px,5vw,56px);
      border-bottom: 1px solid rgba(194,154,72,0.12);
    }
    .toc-list { max-height: 50vh !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="Manifest.jsx"></script>
</body>
</html>
