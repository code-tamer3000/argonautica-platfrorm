# Alembic — конфигурация миграций.
# URL берётся НЕ отсюда, а из окружения (app.core.config.settings) в env.py —
# секреты только в .env, не в git (CLAUDE.md, п.9).

[alembic]
script_location = alembic
prepend_sys_path = .
# Имя файла ревизии: дата + slug, чтобы порядок читался глазами.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
path_separator = os

[post_write_hooks]
# Прогонять ruff по сгенерированным миграциям.
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
