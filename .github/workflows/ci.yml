name: CI

# Зелёный CI обязателен для merge (CLAUDE.md, Git-процесс). Гоняем на каждый PR
# в develop и main. Линт/типы/тесты идут ТОЛЬКО через make-цели — единственный
# санкционированный вход (CLAUDE.md: «NEVER run pytest/ruff/mypy/vite directly»).
#
# make сам поднимает весь стек из docker-compose.test.yaml (postgres/redis/minio
# + one-off `api`-контейнер из прод-Dockerfile). Раннеру нужны только Docker и
# make — НИ host-python, НИ host-node тут не нужны, всё живёт в контейнерах.
on:
  pull_request:
    branches: [develop, main]

# Не держим устаревшие прогоны: новый push в ветку PR отменяет предыдущий.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # `make lint` = ruff + mypy в api-контейнере + tsc в node-контейнере.
  lint:
    name: lint (make lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Собираем test-образ заранее с GHA-кэшем слоёв (apt ffmpeg + pip — дорого).
      # load: true кладёт его в локальный docker store под именем, которое ждёт
      # compose (image: argonautica-test-api), поэтому `make` не пересобирает.
      - name: Build test image (buildx GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: test
          tags: argonautica-test-api:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: make lint

  # `make test` = pytest (api-контейнер) + tsc (node-контейнер). Стек сервисов
  # поднимает сам make (up-test ждёт готовности postgres/redis).
  test:
    name: test (make test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build test image (buildx GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: test
          tags: argonautica-test-api:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Поднять и дождаться сервисов, накатить схему (conftest требует применённых
      # миграций), затем прогнать тесты — всё через санкционированные make-цели.
      - run: make up-test
      - run: make migrate-test
      - run: make test
