name: Agent — Interactive (@claude)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No `prompt`: the action reads the @claude comment as the instruction.
      # Fix requests on a PR land as commits in that PR's branch.
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --max-turns 40
            --allowedTools "Bash(git:*),Bash(gh:*),Bash(make:*),Bash(docker:*),Bash(docker-compose:*),Read,Write,Edit,Glob,Grep"
